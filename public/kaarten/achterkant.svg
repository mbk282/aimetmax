<svg viewBox="0 0 690 940" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- AI-gesprekskaarten: achterkant doosje (huisstijl AI met Max). Vector-master, print-klaar. -->
  <rect x="0" y="0" width="690" height="940" fill="#FAF6EE"/>

  <!-- Dubbele rand (zwart + oranje) -->
  <rect x="22" y="22" width="646" height="896" rx="38" fill="none" stroke="#2A2A2A" stroke-width="4.5"/>
  <rect x="36" y="36" width="618" height="868" rx="30" fill="none" stroke="#E8590C" stroke-width="2"/>

  <!-- ====================== SPREEKWOLK-CLUSTER ====================== -->
  <!-- confetti -->
  <g>
    <circle cx="175" cy="180" r="3.4" fill="#C98A1B"/>
    <circle cx="520" cy="185" r="3.4" fill="#4C8577"/>
    <circle cx="540" cy="320" r="3" fill="#E8590C"/>
    <circle cx="158" cy="330" r="3" fill="#2F6E78"/>
    <circle cx="345" cy="150" r="3" fill="#875A6B"/>
    <path d="M150 250 l6 6 M156 250 l-6 6" stroke="#B5532E" stroke-width="2.4"/>
    <path d="M530 250 l6 6 M536 250 l-6 6" stroke="#C98A1B" stroke-width="2.4"/>
  </g>

  <!-- B2 oranje (boven) -->
  <g stroke="#2A2A2A" stroke-width="3.4">
    <path d="M332 236 L326 258 L350 240 Z" fill="#E8590C"/>
    <rect x="300" y="178" width="88" height="60" rx="18" fill="#E8590C"/>
  </g>
  <!-- B4 mauve (links boven) -->
  <g stroke="#2A2A2A" stroke-width="3.4">
    <path d="M232 262 L222 282 L250 266 Z" fill="#875A6B"/>
    <rect x="198" y="206" width="80" height="56" rx="16" fill="#875A6B"/>
  </g>
  <!-- B3 goud + weegschaal (rechts boven) -->
  <g stroke="#2A2A2A" stroke-width="3.4">
    <path d="M438 258 L450 278 L420 262 Z" fill="#C98A1B"/>
    <rect x="410" y="202" width="80" height="58" rx="16" fill="#C98A1B"/>
  </g>
  <g transform="translate(450,231) scale(1.15)" stroke="#FFFDF8" stroke-width="2.2" fill="none">
    <path d="M12 5 V19 M5 8 H19"/>
    <circle cx="12" cy="4.4" r="1.2" fill="#FFFDF8" stroke="none"/>
    <path d="M5 8 Q3 13 7 13 Q9.5 13 5 8 M19 8 Q17 13 21 13 Q23.5 13 19 8"/>
    <path d="M8 20 H16"/>
  </g>

  <!-- B1 teal centraal + vraagteken -->
  <g stroke="#2A2A2A" stroke-width="3.6">
    <path d="M326 320 L318 346 L344 324 Z" fill="#2F6E78"/>
    <rect x="296" y="248" width="98" height="74" rx="22" fill="#2F6E78"/>
  </g>
  <text x="345" y="298" text-anchor="middle" font-family="'Shantell Sans', cursive" font-size="42" font-weight="800" fill="#FFFDF8">?</text>

  <!-- B5 roze + lamp (links onder) -->
  <g stroke="#2A2A2A" stroke-width="3.4">
    <path d="M222 358 L214 380 L240 362 Z" fill="#FBE3D4"/>
    <rect x="190" y="300" width="86" height="60" rx="18" fill="#FBE3D4"/>
  </g>
  <g transform="translate(221,313) scale(1.3)" stroke="#C98A1B" stroke-width="2" fill="none">
    <circle cx="12" cy="9" r="5.5" fill="#FFE8A3"/>
    <path d="M9 16 H15 M10 18 H14"/>
    <path d="M4 4 L6 6 M20 4 L18 6 M12 1 V2.5"/>
  </g>

  <!-- B6 sage + mensen (rechts onder) -->
  <g stroke="#2A2A2A" stroke-width="3.4">
    <path d="M442 360 L452 382 L424 364 Z" fill="#4C8577"/>
    <rect x="412" y="300" width="90" height="62" rx="18" fill="#4C8577"/>
  </g>
  <g transform="translate(457,332) scale(1.25)">
    <!-- persoon achter -->
    <circle cx="4" cy="-4" r="3" fill="#FFFDF8"/>
    <path d="M-1 8 C-1 2.5 9 2.5 9 8 Z" fill="#FFFDF8"/>
    <!-- persoon voor (sage rand voor scheiding) -->
    <circle cx="-4" cy="-3" r="3.4" fill="#FFFDF8" stroke="#4C8577" stroke-width="1.4"/>
    <path d="M-11 9 C-11 3 3 3 3 9 Z" fill="#FFFDF8" stroke="#4C8577" stroke-width="1.4"/>
  </g>

  <!-- B7 terracotta (onder centraal) -->
  <g stroke="#2A2A2A" stroke-width="3.4">
    <path d="M334 406 L328 428 L352 410 Z" fill="#B5532E"/>
    <rect x="304" y="352" width="82" height="56" rx="16" fill="#B5532E"/>
  </g>

  <!-- ====================== TEKST ====================== -->
  <text x="345" y="540" text-anchor="middle" font-family="'Shantell Sans', cursive" font-size="52" font-weight="800"><tspan fill="#E8590C">AI</tspan><tspan fill="#2A2A2A">-gesprekskaarten</tspan></text>
  <path d="M242 548 Q296 557 350 546" stroke="#E8590C" stroke-width="4" fill="none"/>

  <text x="345" y="586" text-anchor="middle" font-family="'Inter', sans-serif" font-size="22" fill="#5A5550">Ontdek hoe jouw team <tspan fill="#E8590C" font-weight="700">écht</tspan> over AI denkt.</text>

  <!-- oranje streepje -->
  <path d="M325 624 H365" stroke="#E8590C" stroke-width="4"/>

  <!-- inhoud -->
  <text x="345" y="664" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#5A5550">54 gesprekskaarten + 6 spelregelkaarten</text>
  <text x="345" y="690" text-anchor="middle" font-family="'Inter', sans-serif" font-size="15" fill="#5A5550">stellingen · dilemma's · open vragen · 6 thema's</text>

  <!-- ====================== VOET ====================== -->
  <text x="345" y="800" text-anchor="middle" font-family="'Shantell Sans', cursive" font-size="48" font-weight="800" fill="#E8590C">AI met Max</text>
  <path d="M255 814 Q345 824 435 812" stroke="#2A2A2A" stroke-width="3.5" fill="none"/>
  <text x="345" y="842" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#5A5550">aimetmax.nl/kaarten</text>
</svg>
